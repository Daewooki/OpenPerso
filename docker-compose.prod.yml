services:
  postgres:
    container_name: aipp-postgres
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-persona_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-persona_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-persona_platform}
    ports:
      - "5434:5432"
    volumes:
      - aipp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-persona_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    container_name: aipp-redis
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - aipp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    container_name: aipp-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9200:9000"
      - "9201:9001"
    volumes:
      - aipp_minio_data:/data
    restart: unless-stopped

  backend:
    container_name: aipp-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    ports:
      - "8200:8200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    container_name: aipp-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3200:3200"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    container_name: aipp-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  aipp_postgres_data:
  aipp_redis_data:
  aipp_minio_data:
